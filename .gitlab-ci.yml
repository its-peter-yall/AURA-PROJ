stages:
  - install
  - lint
  - test
  - security
  - performance
  - report

variables:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.10"
  PLAYWRIGHT_BROWSERS_PATH: /root/.cache/ms-playwright
  TRIVY_VERSION: "v0.48"

# Cache Playwright browsers
cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .cache/ms-playwright/
    - AURA-CHAT/client/node_modules/

install_dependencies:
  stage: install
  image: node:20-alpine
  before_script:
    - npm ci --prefix AURA-CHAT/client
  script:
    - echo "Dependencies installed"
  artifacts:
    paths:
      - AURA-CHAT/client/node_modules/
    expire_in: 1 hour

install_browsers:
  stage: install
  image: mcr.microsoft.com/playwright:latest
  script:
    - npx playwright install --with-deps chromium firefox webkit
  artifacts:
    paths:
      - ~/.cache/ms-playwright/
    expire_in: 1 hour

test_desktop_chromium:
  stage: test
  image: mcr.microsoft.com/playwright:latest
  needs:
    - install_dependencies
    - install_browsers
  variables:
    CI: "true"
  script:
    - cd AURA-CHAT/client && npx playwright test --project=chromium --reporter=line
  artifacts:
    when: always
    paths:
      - AURA-CHAT/client/test-results/
      - AURA-CHAT/client/playwright-report/
    expire_in: 1 week

