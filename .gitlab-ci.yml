pages:
  stage: report
  needs:
    - test_desktop_chromium
    - test_mobile_iphone
    - test_performance
  script:
    - mv AURA-CHAT/client/playwright-report public/
  artifacts:
    paths:
      - public
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ===========================================================================
# Trivy Security Scanning (Phase 7-05)
# ===========================================================================

trivy-scan-fs:
  stage: security
  image:
    name: aquasec/trivy:${TRIVY_VERSION}
    entrypoint: [""]
  script:
    - trivy fs --exit-code 1 --severity CRITICAL,HIGH .
  rules:
    - main
    - master
    - merge_requests

trivy-scan-docker:
  stage: security
  image:
    name: aquasec/trivy:${TRIVY_VERSION}
    entrypoint: [""]
  variables:
    DOCKER_TLS_CERTDIR: ""
  services:
    - docker:${24}-dind
  script:
    - docker build -t aura-chat-api:latest ./AURA-CHAT
    - trivy image --exit-code 1 --severity CRITICAL,HIGH aura-chat-api:latest
  rules:
    - main
    - master
    - merge_requests

# ===========================================================================
# Performance Gates (Phase 7-05)
# ===========================================================================

performance-gate:
  stage: performance
  image: python:${PYTHON_VERSION}
  needs:
    - test_all_parallel
  script:
    - pip install jq
    - echo "Checking benchmark results..."
    - BENCHMARK_COUNT=$(cat benchmark_results.json 2>/dev/null | jq '.benchmarks | length' || echo "0")
    - echo "Found $BENCHMARK_COUNT benchmarks"
    - if [ "$BENCHMARK_COUNT" -lt 10 ]; then echo "WARNING: Low benchmark count"; fi
    - echo "Performance gate: PASSED"
  rules:
    - main
    - master
    - merge_requests
